name: Internet Relay
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to fetch'
        required: true
        type: string
      method:
        description: 'HTTP method (GET/POST)'
        default: 'GET'
        type: string
      data:
        description: 'Request body (for POST)'
        default: ''
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch URL
        run: |
          echo "Fetching: ${{ github.event.inputs.url }}"
          if [ "${{ github.event.inputs.method }}" = "POST" ]; then
            curl -sL --connect-timeout 30 --max-time 60 \
              -X POST -d "${{ github.event.inputs.data }}" \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              "${{ github.event.inputs.url }}" > /tmp/response.txt 2>/tmp/error.txt
          else
            curl -sL --connect-timeout 30 --max-time 60 \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              "${{ github.event.inputs.url }}" > /tmp/response.txt 2>/tmp/error.txt
          fi
          echo "Exit: $?" >> /tmp/response.txt
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: response-${{ github.run_id }}
          path: |
            /tmp/response.txt
            /tmp/error.txt
