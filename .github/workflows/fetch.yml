name: Fetch Enhanced
on:
  workflow_dispatch:
    inputs:
      url:
        description: URL to fetch
        required: true
        type: string
      method:
        description: HTTP method
        default: GET
        type: string
      id:
        description: Request ID
        default: '0'
        type: string
      data:
        description: Request body
        default: ''
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sL --connect-timeout 30 --max-time 60 \
            -A "Mozilla/5.0" \
            -X ${{ github.event.inputs.method }} \
            -o /tmp/resp.bin \
            -w "%{http_code}" \
            "${{ github.event.inputs.url }}" > /tmp/status.txt
      - run: |
          BODY=$(base64 -w0 < /tmp/resp.bin)
          STATUS=$(cat /tmp/status.txt)
          echo '{"id":"${{ github.event.inputs.id }}","status":"success","http_status":'$STATUS',"body":"'$BODY'","body_size":'$(wc -c < /tmp/resp.bin)'}' > /tmp/result.json
      - uses: actions/upload-artifact@v4
        with:
          name: result-${{ github.event.inputs.id }}
          path: /tmp/result.json
